# This is a basic workflow to help you get started with Actions

name: Sample Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'Jenkinsfile'
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
        
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    build-install-deps:
        runs-on: self-hosted
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/build
    deploy-dev:
        runs-on: self-hosted
        needs: build-install-deps
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/deploy
            with:
              environment: 'dev'
              port: 4003
    test-dev:
        runs-on: self-hosted
        needs: deploy-dev
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/test
            with:
              environment: 'dev'
    deploy-stg:
        runs-on: self-hosted
        needs: test-dev
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/deploy
            with:
              environment: 'stg'
              port: 4004
    test-stg:
        runs-on: self-hosted
        needs: deploy-stg
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/test
            with:
              environment: 'stg'
    deploy-prd:
        runs-on: self-hosted
        needs: test-stg
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/deploy
            with:
              environment: 'prd'
              port: 4005
    test-prd:
        runs-on: self-hosted
        needs: deploy-prd
        steps:
          - uses: actions/checkout@v6
          - uses: ./.github/actions/test
            with:
              environment: 'prd'