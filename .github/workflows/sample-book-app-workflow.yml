# This is a basic workflow to help you get started with Actions

name: Sample Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
        
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
    build-install-deps:
        runs-on: self-hosted
        steps:
          - uses: actions/checkout@v6
          - run: echo "Installing all necessary node dependencies.."
          - name: Install all dependencies
            run: npm install
          - run: echo "Dependencies successfully installed"
    deploy-dev:
        runs-on: self-hosted
        needs: build-install-deps
        steps:
          - uses: ./.github/actions/deploy
            with:
              environment: 'DEV'
              port: 4000
    test-dev:
        runs-on: self-hosted
        needs: deploy-dev
        steps:
          - uses: ./.github/actions/test
            with:
              environment: 'DEV'
    deploy-stg:
        runs-on: self-hosted
        needs: test-dev
        steps:
          - uses: ./.github/actions/deploy
            with:
              environment: 'STG'
              port: 4001
    test-stg:
        runs-on: self-hosted
        needs: deploy-stg
        steps:
          - uses: ./.github/actions/test
            with:
              environment: 'STG'
    deploy-prd:
        runs-on: self-hosted
        needs: test-stg
        steps:
          - uses: ./.github/actions/deploy
            with:
              environment: 'PRD'
              port: 4002
    test-prd:
        runs-on: self-hosted
        needs: deploy-prd
        steps:
          - uses: ./.github/actions/test
            with:
              environment: 'PRD'